<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quick Access</title>
<base target="_blank">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  h1 { color: #fff; margin-bottom: 10px; font-size: 22px; }
  p { color: #aaa; margin-bottom: 40px; font-size: 14px; }
  .buttons { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 160px;
    height: 120px;
    border-radius: 16px;
    text-decoration: none;
    font-weight: bold;
    font-size: 15px;
    color: #fff;
    transition: transform 0.2s, opacity 0.2s;
  }
  a:hover { transform: scale(1.05); opacity: 0.9; }
  .icon { font-size: 36px; margin-bottom: 10px; display: block; }
  .lms    { background: linear-gradient(135deg, #0066cc, #0044aa); }
  .claude { background: linear-gradient(135deg, #c96442, #a0522d); }
  .gemini { background: linear-gradient(135deg, #4285f4, #0f9d58); }
</style>
</head>
<body>
  <h1>Quick Access</h1>
  <p>Each button opens in a new window</p>
  <div class="buttons">
    <a class="lms" href="https://lms.udsm.ac.tz/mod/quiz/view.php?id=27250" target="_blank">
      <span class="icon">📚</span>UDSM LMS
    </a>
    <a class="claude" href="https://claude.ai/new" target="_blank">
      <span class="icon">🤖</span>Claude AI
    </a>
    <a class="gemini" href="https://gemini.google.com/" target="_blank">
      <span class="icon">✨</span>Gemini
    </a>
  </div>
</body>
</html>
